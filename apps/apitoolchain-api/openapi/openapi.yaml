          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
    post:
      operationId: Sdks_addTarget
      parameters:
        - name: sdkId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Apitoolchain.SdkTarget'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Apitoolchain.AddSdkTargetInput'
  /usage:
    get:
      operationId: Usage_list
      parameters:
        - name: range
          in: query
          required: true
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Apitoolchain.UsageSeries'
components:
  schemas:
    Apitoolchain.AddSdkTargetInput:
      type: object
      required:
        - language
      properties:
        language:
          $ref: '#/components/schemas/Apitoolchain.SdkLanguage'
        packageName:
          type: string
      description: Add a language target to an SDK (kicks off generation).
    Apitoolchain.ApiFormat:
      type: string
      enum:
        - openapi
        - graphql
        - asyncapi
        - jsonschema
    Apitoolchain.ApiVersion:
      type: object
      required:
        - version
        - specUrl
        - updatedAt
        - current
      properties:
        version:
          type: string
        specUrl:
          type: string
        updatedAt:
          type: string
        current:
          type: boolean
    Apitoolchain.AuthSession:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/Apitoolchain.User'
      description: Login/register response — the opaque session token + the user it belongs to.
    Apitoolchain.BuildStatus:
      type: string
      enum:
        - ready
        - building
        - error
        - draft
    Apitoolchain.ConnectGitProviderInput:
      type: object
      required:
        - kind
        - token
      properties:
        kind:
          $ref: '#/components/schemas/Apitoolchain.GitProviderKind'
        name:
          type: string
        baseUrl:
          type: string
          description: Provider base URL; optional for github.com/gitlab.com, required for self-hosted.
        token:
          type: string
      description: Connect a git provider (validated via the provider's whoami).
    Apitoolchain.CreateDocsProjectInput:
      type: object
      required:
        - apiId
        - name
      properties:
        apiId:
          type: string
        name:
          type: string
        theme:
          type: string
    Apitoolchain.CreateMcpServerInput:
      type: object
      required:
        - apiId
        - name
      properties:
        apiId:
          type: string
        name:
          type: string
        transport:
          $ref: '#/components/schemas/Apitoolchain.McpTransport'
        url:
          type: string
    Apitoolchain.CreateProjectInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    Apitoolchain.CreateRepoConnectionInput:
      type: object
      required:
        - providerId
        - targetKind
        - targetId
        - repo
      properties:
        providerId:
          type: string
        targetKind:
          $ref: '#/components/schemas/Apitoolchain.RepoTargetKind'
        targetId:
          type: string
        ref:
          type: string
        repo:
          type: string
          description: 'For an existing repo: "owner/name". For a new repo: just the name.'
        createRepo:
          type: boolean
          description: When true, create `repo` (a name) under the account before connecting.
        makePrivate:
          type: boolean
          description: Visibility for a newly-created repo.
        branch:
          type: string
        prefix:
          type: string
        releaseMode:
          type: string
        autoRelease:
          type: boolean
        baseBranch:
          type: string
      description: Link an API spec or SDK target to a repo.
    Apitoolchain.CreateSdkInput:
      type: object
      required:
        - apiId
      properties:
        apiId:
          type: string
        name:
          type: string
        description:
          type: string
        ns:
          type: string
      description: Create a named SDK for an API.
    Apitoolchain.CurrentContext:
      type: object
      required:
        - user
        - org
        - project
        - projects
      properties:
        user:
          allOf:
            - $ref: '#/components/schemas/Apitoolchain.User'
          description: The signed-in account.
        org:
          $ref: '#/components/schemas/Apitoolchain.Organization'
        project:
          allOf:
            - $ref: '#/components/schemas/Apitoolchain.Project'
          description: The caller's current project.
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Apitoolchain.Project'
          description: Every project in the current org (for the switcher).
    Apitoolchain.DistTag:
      type: object
      required:
        - tag
        - version
      properties:
        tag:
          type: string
        version:
          type: string
      description: |-
        A named, movable pointer to a version (npm-style). `latest` is auto-managed
        (set to the newest version on register); others (`canary`, `beta`, …) are set
        by hand. A version ref anywhere may be a concrete version OR a dist-tag name.
    Apitoolchain.DocsProject:
      type: object
      required:
        - id
        - apiId
        - name
        - theme
        - sourceSpec
        - url
        - status
      properties:
        id:
          type: string
        apiId:
          type: string
        name:
          type: string
        theme:
          type: string
        sourceSpec:
          type: string
        url:
          type: string
        status:
          $ref: '#/components/schemas/Apitoolchain.BuildStatus'
        lastBuiltAt:
          type: string
    Apitoolchain.EntryKind:
      type: string
      enum:
        - api
        - schema
      description: 'What kind of document a registry entry holds: a full API spec or a schema.'
    Apitoolchain.GitProvider:
      type: object
      required:
        - id
        - kind
        - name
        - baseUrl
        - connectedAs
        - createdAt
      properties:
        id:
          type: string
        kind:
          $ref: '#/components/schemas/Apitoolchain.GitProviderKind'
        name:
          type: string
        baseUrl:
          type: string
        connectedAs:
          type: string
          description: The username the token authenticated as (from the provider's whoami).
        createdAt:
          type: string
      description: A connected git-provider account (the token lives server-side only).
    Apitoolchain.GitProviderKind:
      type: string
      enum:
        - github
        - gitlab
        - bitbucket
        - gitea
      description: The git platforms the gitprovider service can connect to.
    Apitoolchain.GitRepoOption:
      type: object
      required:
        - fullName
        - defaultBranch
        - htmlUrl
        - private
      properties:
        fullName:
          type: string
        defaultBranch:
          type: string
        htmlUrl:
          type: string
        private:
          type: boolean
      description: A git repo option surfaced by a provider (for the connect picker).
    Apitoolchain.InviteMemberInput:
      type: object
      required:
        - email
      properties:
        email:
          type: string
        role:
          type: string
    Apitoolchain.LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
    Apitoolchain.MarkReadInput:
      type: object
      properties:
        ids:
          type: array
          items:
            type: string
        all:
          type: boolean
    Apitoolchain.McpServer:
      type: object
      required:
        - id
        - apiId
        - name
        - sourceSpec
        - toolsCount
        - transport
        - status
      properties:
        id:
          type: string
        apiId:
          type: string
        name:
          type: string
        sourceSpec:
          type: string
        toolsCount:
          type: integer
          format: int32
        transport:
          $ref: '#/components/schemas/Apitoolchain.McpTransport'
        status:
          $ref: '#/components/schemas/Apitoolchain.BuildStatus'
        url:
          type: string
    Apitoolchain.McpTransport:
      type: string
      enum:
        - http
        - sse
        - stdio
    Apitoolchain.Member:
      type: object
      required:
        - userId
        - email
        - name
        - role
      properties:
        userId:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
      description: A user's membership in the current org.
    Apitoolchain.Notification:
      type: object
      required:
        - id
        - severity
        - title
        - body
        - createdAt
        - read
        - source
      properties:
        id:
          type: string
        severity:
          $ref: '#/components/schemas/Apitoolchain.NotificationSeverity'
        title:
          type: string
        body:
          type: string
        createdAt:
          type: string
        read:
          type: boolean
        source:
          $ref: '#/components/schemas/Apitoolchain.NotificationSource'
        apiId:
          type: string
    Apitoolchain.NotificationSeverity:
      type: string
      enum:
        - info
        - success
        - warning
        - error
    Apitoolchain.NotificationSource:
      type: string
      enum:
        - sdk
        - docs
        - mcp
        - registry
        - system
        - git
    Apitoolchain.Organization:
      type: object
      required:
        - id
        - name
        - plan
      properties:
        id:
          type: string
        name:
          type: string
        plan:
          type: string
    Apitoolchain.OverviewStats:
      type: object
      required:
        - apis
        - sdkTargets
        - docsProjects
        - mcpServers
      properties:
        apis:
          type: integer
          format: int32
        sdkTargets:
          type: integer
          format: int32
        docsProjects:
          type: integer
          format: int32
        mcpServers:
          type: integer
          format: int32
    Apitoolchain.PrepareReleaseInput:
      type: object
      required:
        - connectionId
      properties:
        connectionId:
          type: string
        versionOverride:
          type: string
    Apitoolchain.Project:
      type: object
      required:
        - id
        - name
        - orgId
      properties:
        id:
          type: string
        name:
          type: string
        orgId:
          type: string
    Apitoolchain.RegisterApiInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        format:
          $ref: '#/components/schemas/Apitoolchain.ApiFormat'
        kind:
          allOf:
            - $ref: '#/components/schemas/Apitoolchain.EntryKind'
          description: '`api` (default) or `schema` — classifies the uploaded document.'
        ns:
          type: string
        source:
          type: string
        specText:
          type: string
          description: Inline spec text (yaml/json/graphql SDL). One of specText | url required.
        url:
          type: string
          description: URL to fetch the spec from (server-side).
        version:
          type: string
          description: Explicit version label; defaults to the spec's info.version.
        projectId:
          type: string
          description: |-
            The project the API belongs to. Set server-side by the platform gateway
            from the caller's current project; defaults to the seeded project.
    Apitoolchain.RegisterInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string
    Apitoolchain.RegistryEntry:
      type: object
      required:
        - id
        - name
        - description
        - format
        - kind
        - ns
        - source
        - versions
        - distTags
        - registryUrl
        - updatedAt
        - sdkTargetCount
        - docsProjectCount
        - mcpServerCount
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        format:
          $ref: '#/components/schemas/Apitoolchain.ApiFormat'
        kind:
          allOf:
            - $ref: '#/components/schemas/Apitoolchain.EntryKind'
          description: '`api` (OpenAPI/GraphQL/AsyncAPI) or `schema` (standalone JSON Schema).'
        ns:
          type: string
        source:
          type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/Apitoolchain.ApiVersion'
        distTags:
          type: array
          items:
            $ref: '#/components/schemas/Apitoolchain.DistTag'
          description: dist-tags for this API (always includes `latest`).
        registryUrl:
          type: string
          description: 'Canonical resolvable URL served by registry-api: `/@{ns}/apis/{id}@latest`.'
        updatedAt:
          type: string
        sdkTargetCount:
          type: integer
          format: int32
        docsProjectCount:
          type: integer
          format: int32
        mcpServerCount:
          type: integer
          format: int32
      description: 'The gateway shape the frontend consumes: core + cross-section rollups.'
    Apitoolchain.Release:
      type: object
      required:
        - id
        - connectionId
        - state
        - baseSpecVersion
        - headSpecVersion
        - bumpType
        - fromVersion
        - toVersion
        - changelog
        - changeCount
        - breakingCount
        - headBranch
        - baseBranch
        - prNumber
        - prUrl
        - tag
        - releaseUrl
        - error
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        connectionId:
          type: string
        state:
          $ref: '#/components/schemas/Apitoolchain.ReleaseState'
        baseSpecVersion:
          type: string
        headSpecVersion:
          type: string
        bumpType:
          type: string
        fromVersion:
          type: string
        toVersion:
          type: string
        changelog:
          type: string
        changeCount:
          type: integer
          format: int32
        breakingCount:
          type: integer
          format: int32
        headBranch:
          type: string
        baseBranch:
          type: string
        prNumber:
          type: integer
          format: int32
        prUrl:
          type: string
        tag:
          type: string
        releaseUrl:
          type: string
        error:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    Apitoolchain.ReleaseState:
      type: string
      enum:
        - preparing
        - pr_open
        - merging
        - released
        - failed
        - superseded
      description: A versioned release cycle for an SDK connection (the rolling PR + its state).
    Apitoolchain.RepoConnection:
      type: object
      required:
        - id
        - providerId
        - targetKind
        - targetId
        - repo
        - branch
        - prefix
      properties:
        id:
          type: string
        providerId:
          type: string
        targetKind:
          $ref: '#/components/schemas/Apitoolchain.RepoTargetKind'
        targetId:
          type: string
          description: The API id (spec) or SDK target id (sdk) this connection syncs.
        ref:
          type: string
          description: Optional version/dist-tag ref for spec targets (defaults to current).
        repo:
          type: string
          description: '"owner/name" on the provider.'
        branch:
          type: string
        prefix:
          type: string
          description: Repo subdirectory the files land under (e.g. `specs/` or `sdk/go/`).
        lastSyncedAt:
          type: string
        lastSyncStatus:
          $ref: '#/components/schemas/Apitoolchain.BuildStatus'
        lastSyncError:
          type: string
        releaseMode:
          type: string
          description: '`push` = legacy direct-push sync; `release` = PR-based release pipeline.'
        autoRelease:
          type: boolean
          description: Open/force-update a release PR on every new spec version.
        baseBranch:
          type: string
          description: PR target branch for release mode (distinct from `branch`).
        prerelease:
          type: boolean
        lastReleasedVersion:
          type: string
          description: SDK semver of the last merged release.
      description: Links an API spec or SDK target to a repo; `sync` pushes it there.
    Apitoolchain.RepoTargetKind:
      type: string
      enum:
        - spec
        - sdk
      description: What a repo connection syncs into a repo.
    Apitoolchain.Sdk:
      type: object
      required:
        - id
        - apiId
        - name
        - description
        - ns
        - targetCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        apiId:
          type: string
        name:
          type: string
        description:
          type: string
        ns:
          type: string
        targetCount:
          type: integer
          format: int32
        createdAt:
          type: string
        updatedAt:
          type: string
      description: A named SDK project tied to one API — a collection of per-language targets.
    Apitoolchain.SdkLanguage:
      type: string
      enum:
        - go
        - python
        - node
        - ruby
        - java
        - dotnet
    Apitoolchain.SdkTarget:
      type: object
      required:
        - id
        - sdkId
        - apiId
        - language
        - packageName
        - output
        - version
        - status
      properties:
        id:
          type: string
        sdkId:
          type: string
          description: The parent SDK this target belongs to.
        apiId:
          type: string
        language:
          $ref: '#/components/schemas/Apitoolchain.SdkLanguage'
        packageName:
          type: string
        output:
          type: string
        version:
          type: string
        status:
          $ref: '#/components/schemas/Apitoolchain.BuildStatus'
        lastPublishedAt:
          type: string
        registryUrl:
          type: string
    Apitoolchain.SelectProjectInput:
      type: object
      required:
        - projectId
      properties:
        projectId:
          type: string
    Apitoolchain.SetDistTagInput:
      type: object
      required:
        - tag
        - version
      properties:
        tag:
          type: string
        version:
          type: string
      description: Set (create or move) a dist-tag to point at an existing version.
    Apitoolchain.SetReleaseConfigInput:
      type: object
      required:
        - releaseMode
        - autoRelease
      properties:
        releaseMode:
          type: string
        autoRelease:
          type: boolean
        baseBranch:
          type: string
        prerelease:
          type: boolean
    Apitoolchain.UpdateContextInput:
      type: object
      properties:
        orgName:
          type: string
        projectName:
          type: string
    Apitoolchain.UpdateMemberRoleInput:
      type: object
      required:
        - role
      properties:
        role:
          type: string
    Apitoolchain.UpdateProjectInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    Apitoolchain.UsagePoint:
      type: object
      required:
        - t
        - value
      properties:
        t:
          type: string
        value:
          type: number
          format: double
    Apitoolchain.UsageRange:
      type: string
      enum:
        - 24h
        - 7d
        - 30d
        - 90d
    Apitoolchain.UsageSeries:
      type: object
      required:
        - id
        - label
        - unit
        - total
        - range
        - points
      properties:
        id:
          type: string
        label:
          type: string
        unit:
          type: string
        total:
          type: number
          format: double
        range:
          $ref: '#/components/schemas/Apitoolchain.UsageRange'
        points:
          type: array
          items:
            $ref: '#/components/schemas/Apitoolchain.UsagePoint'
    Apitoolchain.User:
      type: object
      required:
        - id
        - email
        - name
        - createdAt
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        createdAt:
          type: string
      description: An authenticated account. The password hash never leaves the server.
    MarkReadResult:
      type: object
      required:
        - updated
      properties:
        updated:
          type: integer
          format: int32
    NotFoundError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - not_found
        message:
          type: string
    ValidationError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - invalid
        message:
          type: string
