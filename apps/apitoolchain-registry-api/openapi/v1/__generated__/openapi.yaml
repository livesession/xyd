openapi: 3.0.0
info:
  title: apitoolchain registry api
  version: 0.0.0
tags: []
paths:
  /apis:
    get:
      operationId: Apis_list
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Apitoolchain.RegistryEntryCore'
    post:
      operationId: Apis_register
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Apitoolchain.RegistryEntryCore'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Apitoolchain.RegisterApiInput'
  /apis/{apiId}:
    get:
      operationId: Apis_read
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Apitoolchain.RegistryEntryCore'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
    patch:
      operationId: Apis_update
      description: Rename an entry (display name + description). id/ns/format/kind immutable.
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Apitoolchain.RegistryEntryCore'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Apitoolchain.UpdateApiInput'
  /apis/{apiId}/dist-tags:
    post:
      operationId: Apis_setDistTag
      description: Create or move a dist-tag (`latest`, `canary`, …) to an existing version.
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Apitoolchain.RegistryEntryCore'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Apitoolchain.SetDistTagInput'
  /apis/{apiId}/versions/{ref}/spec:
    get:
      operationId: Apis_spec
      description: |-
        Raw spec bytes for a version ref (concrete version | dist-tag | `current`).
        Non-JSON — served as-stored; the SDK returns the raw Response.
      parameters:
        - name: apiId
          in: path
          required: true
          schema:
            type: string
        - name: ref
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: |-
            Raw spec bytes for a version — served as-stored (yaml or json). `@body bytes`
            makes the primary 2xx content NOT application/json, so opensdk generates a
            method that returns the raw `Response` (the platform-api streams it to the SDK
            generator). `contentType` is a settable response header so the stored media
            type is preserved.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
components:
  schemas:
    Apitoolchain.ApiFormat:
      type: string
      enum:
        - openapi
        - graphql
        - asyncapi
        - jsonschema
    Apitoolchain.ApiVersion:
      type: object
      required:
        - version
        - specUrl
        - updatedAt
        - current
      properties:
        version:
          type: string
        specUrl:
          type: string
        updatedAt:
          type: string
        current:
          type: boolean
    Apitoolchain.DistTag:
      type: object
      required:
        - tag
        - version
      properties:
        tag:
          type: string
        version:
          type: string
      description: |-
        A named, movable pointer to a version (npm-style). `latest` is auto-managed
        (set to the newest version on register); others (`canary`, `beta`, …) are set
        by hand. A version ref anywhere may be a concrete version OR a dist-tag name.
    Apitoolchain.EntryKind:
      type: string
      enum:
        - api
        - schema
      description: 'What kind of document a registry entry holds: a full API spec or a schema.'
    Apitoolchain.RegisterApiInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        id:
          type: string
          description: |-
            Explicit id/slug for the entry. Slugified server-side; defaults to a slug
            of `name`. Lets the display title (`name`) be decoupled from the stable id.
        format:
          $ref: '#/components/schemas/Apitoolchain.ApiFormat'
        kind:
          allOf:
            - $ref: '#/components/schemas/Apitoolchain.EntryKind'
          description: '`api` (default) or `schema` — classifies the uploaded document.'
        ns:
          type: string
        source:
          type: string
        specText:
          type: string
          description: Inline spec text (yaml/json/graphql SDL). One of specText | url required.
        url:
          type: string
          description: URL to fetch the spec from (server-side).
        version:
          type: string
          description: Explicit version label; defaults to the spec's info.version.
        distTag:
          type: string
          description: |-
            Dist-tag to publish this version under (default `latest`). `latest` makes
            it the current/default version; any other tag (`canary`, `beta`, …) is a
            side-channel — added without moving `latest`/current off the stable one.
        projectId:
          type: string
          description: |-
            The project the API belongs to. Set server-side by the platform gateway
            from the caller's current project; defaults to the seeded project.
    Apitoolchain.RegistryEntryCore:
      type: object
      required:
        - id
        - name
        - description
        - format
        - kind
        - ns
        - source
        - versions
        - distTags
        - registryUrl
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        format:
          $ref: '#/components/schemas/Apitoolchain.ApiFormat'
        kind:
          allOf:
            - $ref: '#/components/schemas/Apitoolchain.EntryKind'
          description: '`api` (OpenAPI/GraphQL/AsyncAPI) or `schema` (standalone JSON Schema).'
        ns:
          type: string
        source:
          type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/Apitoolchain.ApiVersion'
        distTags:
          type: array
          items:
            $ref: '#/components/schemas/Apitoolchain.DistTag'
          description: dist-tags for this API (always includes `latest`).
        registryUrl:
          type: string
          description: 'Canonical resolvable URL served by registry-api: `/@{ns}/apis/{id}@latest`.'
        updatedAt:
          type: string
      description: "Registry-api's shape: the core registered API, without platform rollups."
    Apitoolchain.SetDistTagInput:
      type: object
      required:
        - tag
        - version
      properties:
        tag:
          type: string
        version:
          type: string
      description: Set (create or move) a dist-tag to point at an existing version.
    Apitoolchain.UpdateApiInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      description: |-
        Editable presentation metadata for an existing registry entry. The id/slug,
        namespace, format, and kind are IMMUTABLE — they're baked into URLs, the
        `apis/<ns>/<api>@<ver>` registry refs, and already-generated SDKs — so only
        the display name + description can change (a partial update; omit to keep).
    NotFoundError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - not_found
        message:
          type: string
    ValidationError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - invalid_spec
        message:
          type: string
