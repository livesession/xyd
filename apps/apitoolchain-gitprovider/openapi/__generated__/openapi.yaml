openapi: 3.0.0
info:
  title: apitoolchain gitproviderd
  version: v1
  description: |-
    apitoolchain gitproviderd — the HTTP wire contract for the Go git-provider
    service. Provider credentials are inlined into every request body (kind,
    baseUrl, token, login); there is no shared auth scheme.
tags: []
paths:
  /branches:
    post:
      operationId: listBranches
      parameters: []
      responses:
        '200':
          description: 200 OK with a JSON body of `T`.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '400':
          description: Bad request — invalid config/kind/token or a malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream provider op failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchesRequest'
  /create-release:
    post:
      operationId: createRelease
      parameters: []
      responses:
        '200':
          description: 200 OK with a JSON body of `T`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReleaseResult'
        '400':
          description: Bad request — invalid config/kind/token or a malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream provider op failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReleaseBody'
  /create-repo:
    post:
      operationId: createRepo
      parameters: []
      responses:
        '200':
          description: 200 OK with a JSON body of `T`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Repo'
        '400':
          description: Bad request — invalid config/kind/token or a malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream provider op failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRepoBody'
  /create-tag:
    post:
      operationId: createTag
      parameters: []
      responses:
        '200':
          description: 200 OK with a JSON body of `T`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTagResult'
        '400':
          description: Bad request — invalid config/kind/token or a malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream provider op failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagBody'
  /healthz:
    get:
      operationId: healthz
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            text/plain:
              schema:
                type: string
  /parse-webhook:
    post:
      operationId: parseWebhook
      parameters: []
      responses:
        '200':
          description: 200 OK with a JSON body of `T`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParseWebhookResult'
        '400':
          description: Bad request — invalid config/kind/token or a malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream provider op failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParseWebhookBody'
  /pr-status:
    post:
      operationId: prStatus
      parameters: []
      responses:
        '200':
          description: 200 OK with a JSON body of `T`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrStatusResult'
        '400':
          description: Bad request — invalid config/kind/token or a malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream provider op failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrStatusBody'
  /register-webhook:
    post:
      operationId: registerWebhook
      parameters: []
      responses:
        '200':
          description: 200 OK with a JSON body of `T`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterWebhookResult'
        '400':
          description: Bad request — invalid config/kind/token or a malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream provider op failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterWebhookBody'
  /repos:
    post:
      operationId: listRepos
      parameters: []
      responses:
        '200':
          description: 200 OK with a JSON body of `T`.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Repo'
        '400':
          description: Bad request — invalid config/kind/token or a malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream provider op failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Creds'
  /sync:
    post:
      operationId: sync
      parameters: []
      responses:
        '200':
          description: 200 OK with a JSON body of `T`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResult'
        '400':
          description: Bad request — invalid config/kind/token or a malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream provider op failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncBody'
  /upsert-pr:
    post:
      operationId: upsertPr
      parameters: []
      responses:
        '200':
          description: 200 OK with a JSON body of `T`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertPrResult'
        '400':
          description: Bad request — invalid config/kind/token or a malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream provider op failed.
          content:
