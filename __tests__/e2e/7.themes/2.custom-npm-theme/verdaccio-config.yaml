storage: /tmp/verdaccio-custom-theme-test
auth:
  htpasswd:
    file: /tmp/verdaccio-custom-theme-htpasswd
    max_users: 100
uplinks:
  npmjs:
    url: https://registry.npmjs.org/
packages:
  "**":
    access: $all
    publish: $all
    unpublish: $all
    proxy: npmjs
max_body_size: 50mb
log:
  type: stdout
  format: pretty
  level: warn