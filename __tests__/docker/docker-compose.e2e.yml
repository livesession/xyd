services:
  verdaccio:
    image: verdaccio/verdaccio:6
    ports:
      - "4873:4873"
    volumes:
      - ./verdaccio/config.yaml:/verdaccio/conf/config.yaml
      - verdaccio-storage:/verdaccio/storage
    healthcheck:
      test: ["CMD", "sh", "-c", "node -e \"fetch('http://localhost:4873/-/ping').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 10

  publish:
    build:
      context: ../..
      dockerfile: __tests__/docker/e2e.Dockerfile
    depends_on:
      verdaccio:
        condition: service_healthy
    environment:
      - npm_config_registry=http://verdaccio:4873
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e

        # Register user and configure auth
        curl -s -X PUT http://verdaccio:4873/-/user/org.couchdb.user:test \
          -H 'Content-Type: application/json' \
          -d '{"name":"test","password":"test"}' > /dev/null

        AUTH=$$(printf 'test:test' | base64)
        printf "registry=http://verdaccio:4873/\n//verdaccio:4873/:_auth=$${AUTH}\nalways-auth=true\n" > ~/.npmrc
        cp ~/.npmrc /xyd/.npmrc

        # Publish all @xyd-js/* packages to Verdaccio
        node release.js --prod --snapshot e2e-test --tag e2e

        echo "done" > /shared/publish-done
        echo "All packages published to Verdaccio"
    volumes:
      - shared-data:/shared

  e2e:
    build:
      context: ../..
      dockerfile: __tests__/docker/e2e.Dockerfile
    depends_on:
      publish:
        condition: service_completed_successfully
      verdaccio:
        condition: service_healthy
    environment:
      - npm_config_registry=http://verdaccio:4873
      - E2E_FILTER=${E2E_FILTER:-}
      - NODE_OPTIONS=--max-old-space-size=4096
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # The monorepo CLI is already built in the image at packages/xyd-cli/dist/index.js
        # XydServer auto-detects it via findMonorepoRoot()
        # Verdaccio has all published packages available for xyd's postWorkspaceSetup

        if [ -n "$$E2E_FILTER" ]; then
          echo "Running e2e tests (filter: $$E2E_FILTER)"
          pnpm exec playwright test "$$E2E_FILTER"
        else
          echo "Running all e2e tests"
          pnpm run test:e2e
        fi
    volumes:
      - shared-data:/shared

volumes:
  verdaccio-storage:
  shared-data: