packages:
  - 'apps/apidocs-demo'
  - 'packages/*'
  - packages/xyd-ask-ai/examples/*
  - '!packages/xyd-js'
  # standalone bun package (own @apitoolchain scope), managed outside the @xyd-js pnpm workspace
  - '!packages/apitoolchain-design-system'
  # apitoolchain support packages: consumed by the standalone bun apps via file:
  # deps (xyd-bridge is esbuild-bundled to dist; schemas is tsp source; dev is
  # the testcontainers dev-vite plugin)
  - '!packages/apitoolchain-xyd-bridge'
  - '!packages/apitoolchain-schemas'
  - '!packages/apitoolchain-dev'
  - '!packages/apitoolchain-release-man'
  - '!packages/apitoolchain-filters'
  - '!packages/apitoolchain-sdk-chain'
  - '!packages/apitoolchain-gitprovider-node'
  - '!packages/apitoolchain-registry-api-node'
  - '!packages/apitoolchain-api-node'
  # - 'cli'
  # - '!packages/xyd-mcp-server' # temporary? cuz it's bun
  - '.xyd/host'